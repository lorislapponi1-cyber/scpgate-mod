name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Install Gradle 4.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '4.9'
      - name: Setup Forge
        run: gradle setupDecompWorkspace
      - name: Build
        run: gradle build
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: scpgate-mod
          path: build/libs/*.jar
